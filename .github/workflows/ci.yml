name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./tests/integration/... -v -count=1

  build:
    name: Cross-platform Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build darwin/arm64
        run: GOOS=darwin GOARCH=arm64 go build -o dist/linked-darwin-arm64 ./cmd/linked

      - name: Build darwin/amd64
        run: GOOS=darwin GOARCH=amd64 go build -o dist/linked-darwin-amd64 ./cmd/linked

      - name: Build linux/amd64
        run: GOOS=linux GOARCH=amd64 go build -o dist/linked-linux-amd64 ./cmd/linked

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/
